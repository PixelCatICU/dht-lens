[dht]
listen_addr = "0.0.0.0:6881"
listen_addr_v6 = "[::]:6881"
bootstrap_nodes = [
  "router.bittorrent.com:6881",
  "dht.transmissionbt.com:6881",
  "router.utorrent.com:6881"
]
routing_table_max_nodes = 200000
bootstrap_query_limit = 1024
get_peers_probe_count = 2
get_peers_probe_depth = 1
get_peers_probe_sample_rate = 16
packet_workers = 8
packet_queue_size = 65536
node_shards = 64
crawl_mode = true
crawl_response_nodes = 8
virtual_nodes = 512

[metadata]
max_concurrent_fetches = 4096
max_peers_per_hash = 64
connect_timeout_secs = 4
metadata_timeout_secs = 8
max_metadata_size_mb = 8

[pipeline]
info_hash_queue_size = 50000
result_queue_size = 100000
peer_collect_window_ms = 2000
print_jsonl = true

[storage]
enabled = true
db_write_concurrency = 4
batch_size = 100
flush_interval_ms = 1000
max_files_per_torrent = 2000
max_file_path_len = 1024

[search]
max_name_ngram_len = 4096
