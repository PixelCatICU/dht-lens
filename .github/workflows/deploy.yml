name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check format
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

  release:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang cmake pkg-config

      - name: Build release binary
        run: cargo build --release --locked

      - name: Pack release assets
        run: |
          mkdir -p dist
          cp target/release/dht-lens dist/dht-lens-linux-amd64
          (cd dist && sha256sum dht-lens-linux-amd64 > SHA256SUMS)

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force
          gh release create latest dist/* \
            --title "dht-lens latest" \
            --notes "Built from ${GITHUB_SHA}" \
            --latest

      - name: Trigger CapRover deploy
        env:
          CAPROVER_DEPLOY_WEBHOOK_URL: ${{ secrets.CAPROVER_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "${CAPROVER_DEPLOY_WEBHOOK_URL}" ]; then
            echo "CAPROVER_DEPLOY_WEBHOOK_URL is not set; skipping CapRover deploy trigger"
            exit 0
          fi
          curl --fail --show-error --silent --location \
            --request POST "${CAPROVER_DEPLOY_WEBHOOK_URL}"
