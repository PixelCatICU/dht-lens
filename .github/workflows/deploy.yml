name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check format
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

  release:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: dht-lens:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pack release assets
        run: |
          mkdir -p dist
          docker save dht-lens:${GITHUB_SHA} | gzip -9 > dist/dht-lens-docker-image-linux-amd64.tar.gz
          sha256sum dist/dht-lens-docker-image-linux-amd64.tar.gz > dist/SHA256SUMS

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force
          gh release create latest dist/* \
            --title "dht-lens latest" \
            --notes "Built from ${GITHUB_SHA}" \
            --latest
